name: SOC Dashboard CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME || 'arn:aws:iam::080641082881:role/ai-native-soc-hackathon-github-actions-role' }}
  DASHBOARD_S3_URI: ${{ vars.DASHBOARD_S3_URI || 's3://ai-native-soc-hackathon-6844f0fb-dashboard/soc' }}
  CLOUDFRONT_DISTRIBUTION_IDS: ${{ vars.CLOUDFRONT_DISTRIBUTION_IDS || 'ES33W2WLPLJZZ E2K8MWQMWC6HG2' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'ai-native-soc-hackathon-backend-api' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'ai-native-soc-hackathon-ecs' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'backend-api' }}

jobs:
  go-test-build:
    name: Run Go Tests & Build API
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache-dependency-path: backend/go.sum

    - name: Run Go Tests
      run: |
        cd backend
        go test ./...

    - name: Build Go Binary
      run: |
        cd backend
        go build -v -o main .

  vite-client-build:
    name: Build React/Vite Client
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        package-manager-cache: false

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Frontend Application
      run: |
        cd frontend
        npm run build

  vite-client-deploy:
    name: Deploy React/Vite Client
    needs: [go-test-build, vite-client-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.AWS_DEPLOY_ENABLED == 'true'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        package-manager-cache: false

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Frontend Application
      run: |
        cd frontend
        npm run build

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Sync Frontend to S3 Bucket
      run: |
        aws s3 sync frontend/dist "$DASHBOARD_S3_URI" --delete

    - name: Invalidate CloudFront CDN Cache
      run: |
        for distribution_id in $CLOUDFRONT_DISTRIBUTION_IDS; do
          aws cloudfront create-invalidation --distribution-id "$distribution_id" --paths "/*"
        done

  docker-build-push-deploy:
    name: Build Docker Image, Push to ECR & Deploy to ECS
    needs: go-test-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.AWS_DEPLOY_ENABLED == 'true'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        IMAGE_TAG: latest
      run: |
        docker buildx build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} --push .

    - name: Force ECS Service Rolling Update
      run: |
        aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --force-new-deployment --region "$AWS_REGION"
