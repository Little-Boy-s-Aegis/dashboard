name: SOC Dashboard CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  go-test-build:
    name: Run Go Tests & Build API
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache-dependency-path: dashboard/backend/go.sum

    - name: Run Go Tests
      run: |
        cd backend
        go test ./...

    - name: Build Go Binary
      run: |
        cd backend
        go build -v -o main .

  vite-client-build:
    name: Build React/Vite Client
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Frontend Application
      run: |
        cd frontend
        npm run build

  docker-build-scan:
    name: Docker Build & Trivy Scan
    needs: go-test-build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Go Backend Docker Image
      run: |
        docker build -t aegis-soc-dashboard:${{ github.sha }} .

    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'aegis-soc-dashboard:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
